## Render Infrastructure as Code
## Docs: https://render.com/docs/infrastructure-as-code
##
## Required secrets (set in Render dashboard → Environment Groups or per-service):
##   JWT_SECRET, RESEND_API_KEY, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET,
##   GOOGLE_REDIRECT_URI, S3_BUCKET, S3_REGION, CLOUDFRONT_KEY_PAIR_ID,
##   CLOUDFRONT_PRIVATE_KEY, CLOUDFRONT_DOMAIN, COOKIE_DOMAIN,
##   FRONTEND_ORIGIN (your Vercel URL)

services:
  - type: web
    name: multica-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: multica-db
          property: connectionString
      - key: JWT_SECRET
        sync: false           # set manually in Render dashboard
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: noreply@multica.ai
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false           # your Vercel deployment URL
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: us-west-2
      - key: CLOUDFRONT_KEY_PAIR_ID
        sync: false
      - key: CLOUDFRONT_PRIVATE_KEY
        sync: false
      - key: CLOUDFRONT_DOMAIN
        sync: false
      - key: COOKIE_DOMAIN
        sync: false

databases:
  - name: multica-db
    databaseName: multica
    user: multica
    plan: starter
    region: oregon
